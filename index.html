<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Years</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
  <div id="loader-line"></div>
</div>

<section id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Five Years of Us</h1>
    <p>Scroll down. Let's start from the beginning.</p>
  </div>
  <div id="scroll-hint"></div>
</section>

<section id="beginning">
  <div class="beginning-content">
    <p class="chat-line prompt" data-text="Unusual skills — dad jokes, tax fraud, origami, dead body disposal, embroidery, identity theft, skateboarding"></p>
    <p class="chat-line reply" data-text="Marry me. Right now. Just do it, don't think about it too much."></p>
  </div>
  <div class="beginning-photo">
    <img src="images/video-call.jpg" alt="">
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
